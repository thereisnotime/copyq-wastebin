6\Name=Wastebin|Configure...
6\InMenu=true
6\Icon=\xf013
6\Command="
    copyq:
    var currentUrl = String(settings('wastebin/url') || 'https://bin.bloerg.net');
    var currentExpiry = String(settings('wastebin/default_expiry') || '172800');
    var expiryLabels = ['1 hour', '6 hours', '1 day', '2 days', '7 days', '30 days'];
    var expiryMap = {}; expiryMap['1 hour'] = 3600; expiryMap['6 hours'] = 21600; expiryMap['1 day'] = 86400; expiryMap['2 days'] = 172800; expiryMap['7 days'] = 604800; expiryMap['30 days'] = 2592000;
    var reverseMap = {}; reverseMap['3600'] = '1 hour'; reverseMap['21600'] = '6 hours'; reverseMap['86400'] = '1 day'; reverseMap['172800'] = '2 days'; reverseMap['604800'] = '7 days'; reverseMap['2592000'] = '30 days';
    var defaultLabel = reverseMap[currentExpiry] || '2 days';
    var result = dialog('.title', 'Wastebin Configuration', 'Wastebin URL:', currentUrl, '.defaultChoice', defaultLabel, '.combo:Default expiry:', expiryLabels);
    if (result === undefined) abort();
    settings('wastebin/url', result['Wastebin URL:']);
    settings('wastebin/default_expiry', expiryMap[result['Default expiry:']]);
    var nl = String.fromCharCode(10);
    popup('Wastebin', 'Configuration saved' + nl + 'URL: ' + result['Wastebin URL:'] + nl + 'Default expiry: ' + result['Default expiry:']);"
