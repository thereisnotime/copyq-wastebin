[Commands]
1\Name=Wastebin|Share
1\InMenu=true
1\Input=text/plain
1\Icon=\xf0c1
1\Command="
    copyq:
    var baseUrl = String(settings('wastebin/url') || '');
    if (!baseUrl) {
        baseUrl = dialog('.title', 'Configure Wastebin', 'Wastebin URL:', 'https://bin.bloerg.net');
        if (!baseUrl) abort();
        settings('wastebin/url', baseUrl);
        settings('wastebin/default_expiry', 172800);
    }
    baseUrl = baseUrl.replace(/\\/+$/, '');
    var expiry = Number(settings('wastebin/default_expiry') || 172800);
    var text = str(data(mimeText));
    if (!text) { popup('Wastebin', 'No text content'); abort(); }
    var payload = {};
    payload.text = text;
    if (expiry > 0) payload.expires = expiry;
    var req = NetworkRequest();
    req.headers = { 'Content-Type': 'application/json' };
    var reply = req.request('POST', baseUrl + '/', JSON.stringify(payload));
    if (reply.error) { popup('Wastebin', 'Network error: ' + reply.error); abort(); }
    if (reply.status < 200 || reply.status >= 300) { popup('Wastebin', 'Upload failed (HTTP ' + reply.status + '): ' + str(reply.data)); abort(); }
    var resp = JSON.parse(str(reply.data));
    var url = baseUrl + resp.path;
    copy(url);
    popup('Wastebin', 'Copied: ' + url);"
