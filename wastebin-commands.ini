2\Command="
    copyq:
    var baseUrl = String(settings('wastebin/url') || '');
    if (!baseUrl) {
        baseUrl = dialog('.title', 'Configure Wastebin', 'Wastebin URL:', 'https://bin.bloerg.net');
        if (!baseUrl) abort();
        settings('wastebin/url', baseUrl);
        settings('wastebin/default_expiry', 172800);
    }
    baseUrl = baseUrl.replace(/\\/+$/, '');
    var text = str(data(mimeText));
    if (!text) { popup('Wastebin', 'No text content'); abort(); }
    var choice = dialog('.title', 'Wastebin - Expiry', '.combo:Expire after:', ['1 hour', '6 hours', '1 day', '2 days', '7 days', '30 days']);
    if (choice === undefined) abort();
    var m = {}; m['1 hour'] = 3600; m['6 hours'] = 21600; m['1 day'] = 86400; m['2 days'] = 172800; m['7 days'] = 604800; m['30 days'] = 2592000;
    var expiry = m[choice];
    var payload = {};
    payload.text = text;
    if (expiry > 0) payload.expires = expiry;
    var req = NetworkRequest();
    req.headers = { 'Content-Type': 'application/json' };
    var reply = req.request('POST', baseUrl + '/', JSON.stringify(payload));
    if (reply.error) { popup('Wastebin', 'Network error: ' + reply.error); abort(); }
    if (reply.status < 200 || reply.status >= 300) { popup('Wastebin', 'Upload failed (HTTP ' + reply.status + '): ' + str(reply.data)); abort(); }
    var resp = JSON.parse(str(reply.data));
    var url = baseUrl + resp.path;
    copy(url);
    popup('Wastebin', 'Copied: ' + url);"
3\Name=Wastebin|Share with password
3\InMenu=true
3\Input=text/plain
3\Icon=\xf023
3\Command="
    copyq:
    var baseUrl = String(settings('wastebin/url') || '');
    if (!baseUrl) {
        baseUrl = dialog('.title', 'Configure Wastebin', 'Wastebin URL:', 'https://bin.bloerg.net');
        if (!baseUrl) abort();
        settings('wastebin/url', baseUrl);
        settings('wastebin/default_expiry', 172800);
    }
    baseUrl = baseUrl.replace(/\\/+$/, '');
    var expiry = Number(settings('wastebin/default_expiry') || 172800);
    var text = str(data(mimeText));
    if (!text) { popup('Wastebin', 'No text content'); abort(); }
    var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    var password = '';
    var i = 0; while (i < 20) { password = password + chars.charAt(Math.floor(Math.random() * chars.length)); i = i + 1; }
    var payload = {};
    payload.text = text;
    payload.password = password;
    if (expiry > 0) payload.expires = expiry;
    var req = NetworkRequest();
    req.headers = { 'Content-Type': 'application/json' };
    var reply = req.request('POST', baseUrl + '/', JSON.stringify(payload));
    if (reply.error) { popup('Wastebin', 'Network error: ' + reply.error); abort(); }
    if (reply.status < 200 || reply.status >= 300) { popup('Wastebin', 'Upload failed (HTTP ' + reply.status + '): ' + str(reply.data)); abort(); }
    var resp = JSON.parse(str(reply.data));
    var url = baseUrl + resp.path;
    var nl = String.fromCharCode(10);
    var clipText = url + ' | Password: ' + password;
    copy(clipText);
    popup('Wastebin', 'Copied:' + nl + clipText);"
